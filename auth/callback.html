<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating... - Cogno Solution</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .callback-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: var(--space-8);
            background: var(--color-bg);
        }
        .loader {
            font-size: 3rem;
            color: var(--color-primary);
            margin-bottom: var(--space-4);
        }
        h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: var(--space-2);
        }
        p {
            color: var(--color-text-secondary);
        }
    </style>
</head>
<body>
    <div class="callback-container">
        <div class="loader">
            <i class="fa-solid fa-circle-notch fa-spin"></i>
        </div>
        <h2 id="status-text">Authenticating...</h2>
        <p id="status-desc">Please wait while we complete your sign-in.</p>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/i18n.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const statusText = document.getElementById('status-text');
            const statusDesc = document.getElementById('status-desc');

            try {
                // Supabase automatically handles the hash/query params and exchanges code for session
                const { data, error } = await CognoSupabase.getSession();

                if (error) throw error;

                if (data.session) {
                    statusText.textContent = "Success!";
                    statusDesc.textContent = "Redirecting to your dashboard...";
                    
                    // Fetch user profile to know where to redirect
                    const { user, error: profileError } = await CognoSupabase.getCurrentUser();
                    
                    if (user && user.profile) {
                        // Redirect based on role
                        const role = user.profile.role || 'student';
                        const dashboardMap = {
                            child: '../dashboard/child-dashboard.html',
                            student: '../dashboard/child-dashboard.html',
                            parent: '../dashboard/parent-dashboard.html',
                            doctor: '../doctor/dashboard.html',
                            admin: '../dashboard/admin-dashboard.html'
                        };
                        
                        setTimeout(() => {
                            window.location.href = dashboardMap[role] || '../dashboard/index.html';
                        }, 1000);
                    } else {
                        // If no profile, user might be new - redirect to a role selection or default dashboard
                        setTimeout(() => {
                            window.location.href = '../dashboard/index.html';
                        }, 1000);
                    }
                } else {
                    statusText.textContent = "Session not found";
                    statusDesc.textContent = "We couldn't find your login session. Redirecting to login...";
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                }
            } catch (err) {
                console.error('Auth callback error:', err);
                statusText.textContent = "Authentication Error";
                statusDesc.textContent = err.message || "An error occurred during sign-in.";
                setTimeout(() => {
                    window.location.href = 'login.html?error=auth_callback_failed';
                }, 3000);
            }
        });
    </script>
</body>
</html>
